name: smart_form_filler
description: A smart form auto-filler with adaptive profile and document assistant.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  http_parser: ^4.0.2

  # Local Storage
  shared_preferences: ^2.2.2

  # PDF
  pdf: ^3.10.7
  path_provider: ^2.1.1

  # File & Image Handling
  file_picker: ^8.1.6
  image_picker: ^1.0.4

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  https://github.com/raghavendrashivam474/smart-form-filler.git