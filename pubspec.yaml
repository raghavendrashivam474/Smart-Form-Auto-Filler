name: smart_form_filler
description: A smart form auto-filler with adaptive profile and document assistant.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  http_parser: ^4.0.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # PDF
  pdf: ^3.10.7
  printing: ^5.11.1
  path_provider: ^2.1.1
  syncfusion_flutter_pdfviewer: ^24.1.41

  # File & Image Handling
  file_picker: ^6.1.1
  image_picker: ^1.0.4

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

  # Utils
  intl: ^0.19.0
  logger: ^2.0.2
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # Uncomment if you have assets
  # assets:
  #   - assets/images/
  #   - assets/icons/